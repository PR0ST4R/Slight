<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slight</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dark-theme">
<div class="app-container">
  <div id="authScreen" class="screen-panel">
    <div id="landingLogoDisplay" style="text-align:center;margin-top:40px;margin-bottom:10px;width:90px;height:90px;margin-left:auto;margin-right:auto;"></div>
    <h2 style="text-align:center;margin-top:0;margin-bottom:30px;">Welcome to Slight</h2>
    <div class="input-group hidden" id="inputsContainer">
      <input type="text" id="nameInput" class="hidden" placeholder="Display Name">
      <input type="text" id="usernameInput" class="hidden" placeholder="Username (e.g. john_doe)">
      <input type="email" id="emailInput" placeholder="Email Address">
      <input type="password" id="passwordInput" placeholder="Password">
      <button onclick="submitAuthForm()" class="btn-primary" id="formSubmitBtn">Submit</button>
      <button onclick="resetAuthScreen()" class="btn-secondary" style="background:transparent;color:#a1a1aa;">&#8592; Go Back</button>
    </div>
    <div class="auth-buttons" id="mainAuthMenu">
      <button onclick="showAuthForm('signup')" class="btn-primary" style="padding:14px;font-size:15px;">Create Account</button>
      <button onclick="showAuthForm('login')" class="btn-secondary">Log In</button>
      <button onclick="handleGuestLogin()" class="btn-guest" style="background:#18181b;color:#a1a1aa;border:1px solid #27272a;">Continue as Guest</button>
    </div>
    <p id="authError" class="error-text"></p>
  </div>
  <div id="appScreen" class="screen-panel hidden">
    <div class="header" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg-header);border-bottom:1px solid var(--border-color);">
      <div style="display:flex;align-items:center;gap:10px;">
        <div id="smallLogoContainer" style="width:24px;height:24px;display:flex;align-items:center;"></div>
        <h3 id="appHeaderTitle" style="margin:0;font-size:16px;color:var(--text-main);">Slight Feed</h3>
      </div>
      <button onclick="handleLogout()" class="btn-danger">Logout</button>
    </div>
    <div id="postingModal" class="modal-overlay hidden">
      <div class="modal-content">
        <h4>Create New Post</h4>
        <textarea id="newPostText" placeholder="What's on your mind?"></textarea>
        <input type="file" id="newPostFile" accept="image/*,video/*" onchange="handleMediaPreview(this)">
        <div id="mediaPreviewArea"></div>
        <div class="modal-actions">
          <button onclick="togglePostModal()" class="btn-secondary">Cancel</button>
          <button onclick="submitPost()" class="btn-primary">Post</button>
        </div>
      </div>
    </div>
    <div id="userProfileModal" class="modal-overlay hidden" onclick="closeUserProfile()">
      <div class="modal-content" onclick="event.stopPropagation()" style="max-height:80vh;overflow-y:auto;padding:0;">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border-color);">
          <h4 style="margin:0;color:var(--text-main);">Profile</h4>
          <button onclick="closeUserProfile()" style="background:transparent;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;">&#10005;</button>
        </div>
        <div id="userProfileBody"></div>
      </div>
    </div>
    <div id="profileView" class="hidden" style="padding:20px;overflow-y:auto;height:calc(100% - 130px);">
      <div style="text-align:center;margin-bottom:24px;background:var(--bg-card);padding:20px;border-radius:16px;border:1px solid var(--border-color);">
        <div style="position:relative;width:100px;height:100px;margin:0 auto 12px auto;cursor:pointer;" onclick="document.getElementById('pfpFileInput').click()">
          <div id="myProfileAvatar" style="width:100%;height:100%;border-radius:50%;overflow:hidden;border:2px solid #2563eb;"></div>
          <div style="position:absolute;bottom:0;right:0;background:#2563eb;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:12px;">&#128247;</div>
        </div>
        <input type="file" id="pfpFileInput" accept="image/*" style="display:none;" onchange="uploadProfilePicture(this)">
        <h2 id="profileNameDisplay" style="margin:0 0 2px 0;color:var(--text-main);">User</h2>
        <p id="profileUsernameDisplay" style="margin:0 0 4px 0;color:#2563eb;font-size:14px;font-weight:600;"></p>
        <p id="profileEmailDisplay" style="margin:0;color:#a1a1aa;font-size:13px;">user@slight.com</p>
      </div>
      <h4 style="color:var(--text-main);margin-bottom:12px;">Settings &amp; Preferences</h4>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div style="display:flex;align-items:center;justify-content:space-between;background:var(--bg-card);padding:14px;border-radius:12px;border:1px solid var(--border-color);">
          <span style="color:var(--text-main);font-size:15px;">Interface Theme</span>
          <button id="themeToggleBtn" onclick="toggleTheme()" class="btn-secondary" style="margin:0;padding:6px 12px;">&#9728;&#65039; Light Mode</button>
        </div>
        <div onclick="switchTab('library')" style="display:flex;align-items:center;justify-content:space-between;background:var(--bg-card);padding:14px;border-radius:12px;border:1px solid var(--border-color);cursor:pointer;"><div style="display:flex;align-items:center;gap:10px;"><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAgAAAAIACAYAAAD0eNT6AAAQAElEQVR4AeydCfx11fT/b/8iVKbSoFIoJSJSGUKGDA3K0GAICZkz9IsyJUNolOmnjNGgIqk0IBGpUH6JJKmkQZPmSfL/fJ6n7/Pc7/N8hzucc/Za57y/r7W++9x7z9l77fe+95x19tl77f/X4w8CEIAABCAAgc4RwAHoXJNTYQhAAAIQgECvhwPAtwACEIAABCDQQQI4AB1sdKoMAQhAAALdJuDa4wCYAgoBCEAAAhDoGAEcgI41ONWFAAQgAIGuE5hbfxyAuRz4DwEIQAACEOgUARyATjU3lYUABCAAga4TmKg/DsAECVIIQAACEIBAhwjgAHSosakqBCAAAQh0ncD8+uMAzGfBFgQgAAEIQKAzBHAAOtPUVBQCEIAABLpOoL/+OAD9NNiGAAQgAAEIdIQADkBHGppqQgACEIBA1wlMrj8OwGQevIIABCAAAQh0ggAOQCeamUpCAAIQgEDXCSxYfxyABYnwGgIQgAAEINABAjgAHWhkqggBCEAAAl0nsHD9cQAWZsI7EIAABCAAgdYTwAFofRNTQQhAAAIQ6DqBqeqPAzAVFd6DAAQgAAEItJwADkDLG5jqQQACEIBA1wlMXX8cgKm58C4EIAABCECg1QRwAFrdvFQOAhCAAAS6TmC6+uMATEeG9yEAAQhAAAItJoAD0OLGpWoQgAAEINB1AtPXHwdgejZ8AgEIQAACEGgtARyA1jYtFYMABCAAga4TmKn+OAAz0eEzCEAAAhCAQEsJ4AC0tGGpFgQgAAEIdJ3AzPXHAZiZD59CAAIQgAAEWkkAB6CVzUqlIAABCECg6wRmqz8OwGyE+BwCEIAABCDQQgI4AC1sVKoEAQhAAAJdJzB7/XEAZmfEHhCAAAQgAIHWEcABaF2TUiEIQAACEOg6gUHqjwMwCCX2gQAEIAABCLSMAA5AyxqU6kAAAhCAQNcJDFZ/HIDBOLEXBCAAAQhAoFUEcABa1ZxUBgIQgAAEuk5g0PrjAAxKiv0gAAEIQAACLSKAA9CixqQqEIAABCDQdQKD1x8HYHBW7AkBCEAAAhBoDQEcgNY0JRWBAAQgAIGuExim/jgAw9BiXwhAAAIQgEBLCOAAtKQhqQYEIAABCHSdwHD1xwEYjhd7QwACEIAABFpBAAegFc3Yuko8RDWa0OW1/Sjp0lK/t7hSBAIRCdxfRvk7uqxSf2dXVOrXE7qIXiMQqI3AsBnjAAxLjP1HIbCMDtpA+mrpe6Wfln5d+kPp6dILpTdJ/3uvXq90Qq/U9kXSa6V+7w6l3u8upX79d6XnSH8sPUz6BenHpG+TbiJdS/oAKQKBYQgsqZ0fJ91M+nbpHtIvSg+X/lT6e+llUn8H71bq7+RtSv36n0r9nf2HUr+e0Hv02vv5u+7vvL/7/g34t+DfhH8br9I+/q34N6NNBAL1EcABqI9t13L2nfm6qvQO0k9Jj5D+TnqD9BrpGdLvSPeRvl+6vXRz6dOkq0mXkg4j99HOvrNaWek60udLt5X6ZP0RpT5ZH6/0j9JbpVdLz5J+V/ph6cukq0sXlSLdJLCYqr2m9BXSj0r9nf2tUn9fb1Z6nvRYqZ1Kf2fsVG6j18+VPlG6ktTfwWG/Q/6u+zvv775/A/4t+Dfh38YhytO/Fdvg347t
